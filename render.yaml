services:
  - type: web
    name: netzor-web
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: netzor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NETZOR_PAY_PROVIDER
        value: razorpay

databases:
  - name: netzor-db
    plan: free
