# Optional: Render Dashboard -> New -> Blueprint -> connect repo csnetzor-del/netzor-web
databases:
  - name: netzor-db
    plan: free
    databaseName: netzor
    user: netzor

services:
  - type: web
    name: netzor-web
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npm run db:seed-all && npm run build
    # Do NOT use "npm start -p $PORT" — npm treats -p as --prefix and breaks Next.js
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: netzor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NETZOR_PAY_MERCHANT_ID
        value: NZR-PROD
      - key: NETZOR_PAY_API_KEY
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        value: https://www.netzor.in
      - key: NEXT_PUBLIC_WHATSAPP_URL
        sync: false
