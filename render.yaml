# Optional: Render Dashboard -> New -> Blueprint -> connect repo csnetzor-del/netzor-web
databases:
  - name: netzor-db
    plan: free
    databaseName: netzor
    user: netzor

services:
  - type: web
    name: netzor-web
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npm run build
    # Do NOT use "npm start -p $PORT" — npm treats -p as --prefix and breaks Next.js
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: netzor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NETZOR_PAY_PROVIDER
        value: razorpay
      - key: NETZOR_PAY_MERCHANT_ID
        value: NZR-PROD
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_WHATSAPP_URL
        sync: false
