# Proxy-only: Netlify forwards netzor.in → Render (no Next.js build on Netlify)

[build]
  command = "mkdir -p public && echo NETZOR proxy to Render > public/index.html"
  publish = "public"

[[plugins]]
  package = "@netlify/plugin-nextjs"
  enabled = false

[[redirects]]
  from = "/*"
  to = "https://netzor-web.onrender.com/:splat"
  status = 200
  force = true
